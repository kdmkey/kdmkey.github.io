<h1>ORDER FORM</h1>

<form action="https://formspree.io/f/xqeypekn" method="POST">

<label>お名前</label>
<input 
type="text" 
name="name" 
required 
minlength="2"
oninvalid="this.setCustomValidity('お名前を入力してください')"
oninput="this.setCustomValidity('')"
>

<label>お電話番号 <span class="optional">(任意)</span></label>
<input 
type="tel" 
name="phone" 
pattern="[0-9\-]{10,13}" 
placeholder="例：09012345678"
oninvalid="this.setCustomValidity('正しい電話番号を入力してください')"
oninput="this.setCustomValidity('')"
>

<label>メールアドレス</label>
<input 
type="email" 
name="email" 
required
oninvalid="this.setCustomValidity('メールアドレスを入力してください')"
oninput="this.setCustomValidity('')"
>
<p class="notice">※返信可能なメールアドレスをご入力ください。</p>

<label>Instagramアカウント <span class="optional">(任意)</span></label>
<input 
type="text" 
name="instagram" 
placeholder="例：@username"
pattern="^@?[A-Za-z0-9._]{1,30}$"
oninvalid="this.setCustomValidity('正しいInstagramアカウントを入力してください')"
oninput="this.setCustomValidity('')"
>

<label>ご希望の制作内容</label>
<select 
name="service" 
required
oninvalid="this.setCustomValidity('制作内容を選択してください')"
oninput="this.setCustomValidity('')"
>
<option value="">選択してください</option>
<option value="ホームページ制作">ホームページ制作</option>
<option value="ECサイトデザインカスタム">ECサイトデザインカスタム</option>
<option value="デザイン">ロゴデザイン</option>
<option value="その他">その他</option>
</select>
<p class="notice">
    ※ECサイトは現状「BASE」に限ります。<br>
    ※選択項目にない商品は“その他”をお選びいただき、お気軽にお問合せください。
</p>

<label>希望納期</label>
<select 
name="deadline" 
required
oninvalid="this.setCustomValidity('希望納期を選択してください')"
oninput="this.setCustomValidity('')"
>
<option value="">選択してください</option>
<option value="〜1ヶ月">〜1ヶ月</option>
<option value="1ヶ月〜2ヶ月">1ヶ月〜2ヶ月</option>
<option value="〜3ヶ月">〜3ヶ月</option>
<option value="その他">未定</option>
</select>

<label>ご予算 <span class="optional">(任意)</span></label>
<input type="text" name="budget" placeholder="例：⚪︎万円前後">

<label>その他</label>
<textarea name="message"></textarea>

<ul class="notice">
    <li>内容をご確認のうえ送信してください。</li>
    <li>返信にはお時間をいただく場合があります。</li>
    <li>3日以内に返信がない場合は再度ご連絡ください。</li>
</ul>

<label class="agreement">
    <input type="checkbox" id="agree">
    上記の確認事項に同意します
</label>
    
<button type="submit" id="submitBtn" disabled>送信</button>

</form>

<script src="script.js"></script>
